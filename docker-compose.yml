services:
  postgres:
    image: postgres:16
    container_name: ironiacraft-db
    environment:
      POSTGRES_DB: ironiacraft
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  postgres_data:
