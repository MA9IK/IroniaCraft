spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: IroniaCraft
  datasource:
    url: jdbc:postgresql://localhost:5433/ironiacraft
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

ironiacraft:
  modpacks-dir: ./modpacks
  javaL:
    java8-path: /usr/lib/jvm/java-8-temurin-jdk/bin/java
    java17-path: /usr/lib/jvm/java-17-temurin-jdk/bin/java
    java21-path: /usr/lib/jvm/java-21-temurin-jdk/bin/java
